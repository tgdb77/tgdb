# TGDB 自訂規則區
# 你可以在此加入白名單、黑名單或例外規則（SecRule / SecAction）。
# 建議先在 monitor（DetectionOnly）模式觀察，再切換到 block。

# 範例：封鎖特定 User-Agent
# SecRule REQUEST_HEADERS:User-Agent "@contains sqlmap" \
#   "id:1000001,phase:1,deny,status:403,log,msg:'Blocked suspicious UA: sqlmap'"

# 範例：針對特定路徑降低敏感規則（請依需求調整）
# SecRule REQUEST_URI "@beginsWith /healthz" \
#   "id:1000002,phase:1,pass,nolog,ctl:ruleEngine=Off"

user  nginx;
worker_processes  auto;

load_module /usr/lib/nginx/modules/ngx_http_brotli_filter_module.so;
load_module /usr/lib/nginx/modules/ngx_http_brotli_static_module.so;
load_module /usr/lib/nginx/modules/ngx_http_zstd_filter_module.so;
load_module /usr/lib/nginx/modules/ngx_http_zstd_static_module.so;
#load_module /usr/lib/nginx/modules/ngx_http_modsecurity_module.so;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

worker_rlimit_nofile 65535;

events {
    multi_accept on;
    worker_connections 2048;
}

http {
    server_tokens off;
    http2 on;  # HTTP/3 於各站點 server listen 啟用

    # TLS 基本
    ssl_prefer_server_ciphers on;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:30m;
    ssl_session_timeout 1h;

    # 安全標頭（HSTS 交由 Cloudflare 控制）
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "no-referrer";
    add_header Permissions-Policy "geolocation=(), microphone=()";
    add_header Vary "Accept-Encoding" always;

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log main buffer=512k flush=10s;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 120s;
    keepalive_requests 8000;

    # 代理優化（動態/大檔）
    proxy_buffering off;
    proxy_socket_keepalive on;
    proxy_request_buffering off;
    proxy_max_temp_file_size 0;
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    # 僅對靜態資源啟用壓縮
    gzip on; 
    gzip_static on; 
    gzip_proxied any;
    gzip_vary on;

    gzip_comp_level 4; 
    gzip_buffers 8 256k; 
    gzip_min_length 50;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml text/xml application/rss+xml application/atom+xml image/svg+xml font/woff font/woff2 application/wasm;

    # 啟用 Brotli/Zstd（含預壓縮）；kjlion/nginx:alpine 已內建對應模組
    brotli on; 
    brotli_static on;

    brotli_comp_level 4;
    brotli_buffers 8 256k;
    brotli_min_length 50;
    brotli_window 1024k;
    brotli_types text/plain text/css text/javascript application/javascript application/json application/xml text/xml application/rss+xml application/atom+xml image/svg+xml font/woff font/woff2 application/wasm;
    
    zstd on; 
    zstd_static on;

    zstd_comp_level 3;
    zstd_buffers 16 512k;
    zstd_min_length 1024;
    zstd_types text/plain text/css text/javascript application/javascript application/json application/xml text/xml application/rss+xml application/atom+xml image/svg+xml;

    # TGDB WAF（ModSecurity）開關檔：由 Nginx WAF 管理功能維護
    #include /etc/nginx/modsecurity/tgdb-waf.conf;

    include /etc/nginx/conf.d/*.conf;
}

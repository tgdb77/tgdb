<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歡迎使用 TGDB Nginx 服務！</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 3rem 2rem;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            margin: 2rem;
        }

        h1 {
            color: #333;
            font-size: 2.5rem;
            margin-bottom: 1rem;
            font-weight: 700;
        }

        .subtitle {
            color: #666;
            font-size: 1.2rem;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0;
        }

        .feature {
            background: #f8f9fa;
            padding: 1.5rem;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .feature h3 {
            color: #333;
            margin-bottom: 0.5rem;
            font-size: 1.1rem;
        }

        .feature p {
            color: #666;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .status {
            background: #d4edda;
            color: #155724;
            padding: 1rem;
            border-radius: 10px;
            margin: 2rem 0;
            border: 1px solid #c3e6cb;
        }

        .footer {
            margin-top: 2rem;
            color: #888;
            font-size: 0.9rem;
        }

        .logo {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🚀</div>
        <h1>TGDB Nginx 服務</h1>
        <p class="subtitle">您的 Nginx 服務器已成功啟動並正在運行！</p>
        
        <div class="status">
            <strong>✅ 服務狀態：正常運行</strong>
        </div>
        
        <div class="features">
            <div class="feature">
                <h3>🔧 高性能</h3>
                <p>優化的 Nginx 配置，提供卓越的性能和穩定性</p>
            </div>
            <div class="feature">
                <h3>🛡️ 安全防護</h3>
                <p>內建安全設置，保護您的網站免受常見攻擊</p>
            </div>
            <div class="feature">
                <h3>📱 響應式</h3>
                <p>完美支持各種設備和瀏覽器</p>
            </div>
            <div class="feature">
                <h3>⚡ 快速部署</h3>
                <p>使用 TGDB 管理系統快速配置和部署</p>
            </div>
        </div>
        
        <div class="footer">
            <p>由 TGDB 管理系統提供支持 | Powered by Nginx</p>
        </div>
    </div>
</body>
</html>
